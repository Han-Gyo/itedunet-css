<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    *{
   margin: 0;
   padding: 0;
}
    input {
        display: inline-block;
        width: 100px;
        height: 20px;
        margin: 50px 0;
        padding: 20px 0;
    }
    input:nth-child(2){
      display: none; }

      input:nth-child(1):hover{
        background-color: red;
        opacity: 1;
      }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>display_inlineblock</title>
</head>
<body>
  <input type="text" value="1">
  <input type="text" value="2">
  <input type="text" value="3">
</body>
</html>
