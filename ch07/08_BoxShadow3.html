<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    img {
      padding: 20px;
      margin: 20px;
    }

    .shadow1 {
      /* Bottom right coner */
      box-shadow: 5px 5px 10px #000;
    }

    .shadow2 {
      /* Up right coner */
      box-shadow: 5px -5px 10px #000;
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <img src="./츠텐카쿠.jpg" class="shadow1">
  <img src="kmsj.png" width="270" class="shadow2">
</body>

</html>
