<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .parent {
      width: 300px;
      height: 250px;
      border: 4px solid;
      overflow: visible;
      /* hidden,scroll,auto */
    }

    .parent .child {
      width: 100px;
      height: 100px;
      background: green;
      border: 4px solid red;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>overflow</title>
</head>

<body>
  <div class="parent">
    <div class="child">1</div>
    <div class="child">2</div>
    <div class="child">3</div>
  </div>
</body>

</html>
