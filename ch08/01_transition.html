<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background: red;
      transition-property: width, background-color;
      transition-timing-function: ease-out, linear;
      transition-duration: 1s, 5s
    }

    .box:hover {
      width: 300px;
      background: blue;
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>transition</title>
</head>

<body>
  <div class="box"></div>
</body>

</html>
