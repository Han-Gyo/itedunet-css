<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    * {
      color: inherit;
      text-decoration: none;
    }
    /* a {
        text-decoration: none;
        color: white;
    } */

    div {
      color: white;
      position: absolute;
      left: 0px;
      width: 80px;
      height: 50px;
      background: #ff8080; 
      border: 1px solid red;
      transition-property: width background;
      transition-duration: 2s, 2s;
      line-height: 50px;
    }

    div:hover {
      width: 200px;
      transition-timing-function: linear;
      background: #ff0000;
      color: black;
      text-align: center;
      font-size: 30px;
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홈페이지 메뉴 만들기</title>
</head>

<body>
  <div style="top:50px"><a href="http://www.naver.com" target="new">Home</a></div>
  <div style="top:100px"><a href="#" target="new">ABOUT</a></div>
  <div style="top:150px"><a href="#" target="new">NEWS</a></div>
  <div style="top:200px"><a href="#" target="new">STUDY</a></div>
  <div style="top:250px"><a href="#" target="new">CONTACT</a></div>
</body>

</html>
